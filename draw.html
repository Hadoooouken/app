<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
  <title>DRAW TEMPLATE</title>
  <link rel="stylesheet" type="text/css" href="./modern-normalize.min.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div id="workspace"></div>

  <input id="image-input" type="file" accept="image/png,image/jpeg,image/jpg" hidden />

  <div class="app-ui app-ui-left">
    <div class="main">
      <div class="button" data-button="menu">
        <div class="icon">
          <svg>
            <use href="./planner/assets/sprite.svg#ui-menu"></use>
          </svg>
        </div>
        <div class="label">Опции</div>
      </div>



      <div id="btn-build-mode" class="button with-sub" data-button="build">
        <div class="icon">
          <svg>
            <use href="./planner/assets/sprite.svg#ui-wall"></use>
          </svg>
        </div>
        <div class="label">Строительство</div>
      </div>

      <div id="btn-undo" class="button" data-button="undo">
        <div class="icon">
          <svg>
            <use href="./planner/assets/sprite.svg#ui-undo"></use>
          </svg>
        </div>
        <div class="label">Undo</div>
      </div>
    </div>
  </div>

  <div class="app-ui app-ui-right">
    <div class="main">
      <div id="zoom-in" class="button" data-button="zoom-in">
        <div class="icon">
          <svg>
            <use href="./planner/assets/sprite.svg#ui-zoom-in"></use>
          </svg>
        </div>
      </div>

      <div id="btn-center" class="button" data-button="zoom-centred">
        <div class="icon">
          <svg>
            <use href="./planner/assets/sprite.svg#ui-zoom-centred"></use>
          </svg>
        </div>
      </div>

      <div id="zoom-out" class="button" data-button="zoom-out">
        <div class="icon">
          <svg>
            <use href="./planner/assets/sprite.svg#ui-zoom-out"></use>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <div id="submenu-build" class="sub-menu" data-parent-button="build">
    <div class="main">
      <div id="tool-capital" class="button">
        <div class="icon">
          <svg>
            <use href="./planner/assets/sprite.svg#ui-wall"></use>
          </svg>
        </div>
        <div class="label">Капиталка</div>
      </div>

      <div id="tool-window" class="button">
        <div class="icon">
          <svg>
            <use href="./planner/assets/sprite.svg#ui-wall"></use>
          </svg>
        </div>
        <div class="label">Окно</div>
      </div>

      <div id="tool-balcony" class="button">
        <div class="icon">
          <svg>
            <use href="./planner/assets/sprite.svg#ui-wall"></use>
          </svg>
        </div>
        <div class="label">Балкон</div>
      </div>

      <div id="tool-entry-door" class="button">
        <div class="icon">
          <svg>
            <use href="./planner/assets/sprite.svg#ui-door"></use>
          </svg>
        </div>
        <div class="label">Входная дверь</div>
      </div>

      <div id="tool-riser-h" class="button">
        <div class="icon">
          <svg>
            <use href="./planner/assets/sprite.svg#ui-sofa"></use>
          </svg>
        </div>
        <div class="label">Стояк H</div>
      </div>

      <div id="tool-riser-v" class="button">
        <div class="icon">
          <svg>
            <use href="./planner/assets/sprite.svg#ui-sofa"></use>
          </svg>
        </div>
        <div class="label">Стояк V</div>
      </div>
    </div>
  </div>

  <div id="submenu-options" class="sub-menu grouped" data-parent-button="menu">
    <div class="group">
      <div class="group-label">Опции</div>
      <div class="group-items">
        <div id="btn-load-image" data-button="load-image">
          <div class="label">Загрузить план</div>
          <div class="size"></div>
        </div>

        <div id="btn-save-json" data-button="save-json">
          <div class="label">Сохранить JSON</div>
          <div class="size"></div>
        </div>

        <div id="btn-clear" data-button="clear-template">
          <div class="label">Очистить</div>
          <div class="size"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="status" class="status"></div>
  <div id="hint" class="hint"></div>

  <script src="./script.js"></script>
  <script type="module">

    import { DrawTemplate } from "./planner/draw-app.js";

    DrawTemplate.init({
      config: {
        walls: {
          CAP_W: 50
        },
        theme: {
          wall: {
            capital: "#2a4f3d"
          }
        }
      }
    });
  </script>
</body>

</html>

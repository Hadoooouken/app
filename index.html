<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <title>PLANNER</title>
    <link rel="stylesheet" type="text/css" href="./modern-normalize.min.css" />
    <link rel="stylesheet" href="./styles.css" />
</head>

<body>
    <div id="workspace"></div>

    <div class="app-ui app-ui-left">
        <div class="main">
            <div>

            </div>
            <div class="button" data-button="menu">
                <div class="icon"><svg>
                        <use href="./planner/assets/sprite.svg#ui-menu"></use>
                    </svg></div>
                <div class="label">Опции</div>
            </div>
            <div class="button mobile-only" data-button="mode-select">
                <div class="icon"><svg>
                        <use href="./planner/assets/sprite.svg#ui-cursor"></use>
                    </svg></div>
                <div class="label">Выделение</div>
            </div>
            <div class="button mobile-only" data-button="mode-move">
                <div class="icon"><svg>
                        <use href="./planner/assets/sprite.svg#ui-move"></use>
                    </svg></div>
                <div class="label">Перемещение</div>
            </div>
            <div class="button with-sub" data-button="build">
                <div class="icon"><svg>
                        <use href="./planner/assets/sprite.svg#ui-wall"></use>
                    </svg></div>
                <div class="label">Строительство</div>
            </div>
            <div id="btn-furniture" class="button with-sub" data-button="mebel">
                <div class="icon"><svg>
                        <use href="./planner/assets/sprite.svg#ui-sofa"></use>
                    </svg></div>
                <div class="label">Мебель</div>
            </div>
            <div id="undo" class="button inactive" data-button="undo">
                <div class="icon"><svg>
                        <use href="./planner/assets/sprite.svg#ui-undo"></use>
                    </svg></div>
                <div class="label">Отменить</div>
            </div>
            <div id="btn-trash" class="button inactive" data-button="trash">
                <div class="icon"><svg>
                        <use href="./planner/assets/sprite.svg#ui-trash"></use>
                    </svg></div>
                <div class="label">Удалить</div>
            </div>
        </div>
    </div>

    <div class="app-ui app-ui-right">
        <div class="main">
            <div id="zoom-in" class="button" data-button="zoom-in">
                <div class="icon"><svg>
                        <use href="./planner/assets/sprite.svg#ui-zoom-in"></use>
                    </svg></div>
            </div>
            <div id="zoom-reset" class="button" data-button="zoom-centred">
                <div class="icon"><svg>
                        <use href="./planner/assets/sprite.svg#ui-zoom-centred"></use>
                    </svg></div>
            </div>
            <div id="zoom-out" class="button" data-button="zoom-out">
                <div class="icon"><svg>
                        <use href="./planner/assets/sprite.svg#ui-zoom-out"></use>
                    </svg></div>
            </div>
        </div>
    </div>

    <div id="submenu-build" class="sub-menu" data-parent-button="build">
        <div class="main">
            <div id="btn-wall" class="button" data-button="add-wall">
                <div class="icon"><svg>
                        <use href="./planner/assets/sprite.svg#ui-wall"></use>
                    </svg></div>
                <div class="label">Стена</div>
            </div>
            <div id="btn-door" class="button" data-button="add-door">
                <div class="icon"><svg>
                        <use href="./planner/assets/sprite.svg#ui-door"></use>
                    </svg></div>
                <div class="label">Дверь</div>
            </div>
        </div>
    </div>
    <div id="furniture-menu" class="sub-menu grouped" data-parent-button="mebel"></div>
    <div id="submenu-options" class="sub-menu grouped" data-parent-button="menu">
        <div class="group">
            <div class="group-label">Опции</div>
            <div class="group-items">
                <div id="btn-metrics" data-button="metrics">
                    <div class="label">Скрыть/показать размеры</div>
                    <div class="size"></div>
                </div>

                <div id="btn-reset" data-button="reset">
                    <div class="label">Очистить сцену</div>
                    <div class="size"></div>
                </div>
            </div>
        </div>
    </div>
    </div>
    <script src="./script.js"></script>
    <script type="module">
        import { Planner } from "./planner/app.js";

        Planner.init({
            template: "templates/1.json",
            config: {
                walls: {
                    CAP_W: 50
                },
                theme: {
                    wall: {
                        capital: "#2a4f3d",
                        normal: "#2a4f3d"
                    }
                }
            }
        });
    </script>
</body>

</html>

    <title>PLANNER</title>

<body>
    <div id="workspace"></div>

    <div class="app-ui app-ui-left">
        <div class="main">
            <div class="button" data-button="menu">
                <div class="icon"><svg>
                        <use href="/tmp/sprite.svg#ui-menu"></use>
                    </svg></div>
                <div class="label">Опции</div>
            </div>
            <div class="button mobile-only" data-button="mode-select">
                <div class="icon"><svg>
                        <use href="/tmp/sprite.svg#ui-cursor"></use>
                    </svg></div>
                <div class="label">Выделение</div>
            </div>
            <div class="button mobile-only active" data-button="mode-move">
                <div class="icon"><svg>
                        <use href="/tmp/sprite.svg#ui-move"></use>
                    </svg></div>
                <div class="label">Перемещение</div>
            </div>
            <div class="button with-sub" data-button="build">
                <div class="icon"><svg>
                        <use href="/tmp/sprite.svg#ui-wall"></use>
                    </svg></div>
                <div class="label">Строительство</div>
            </div>
            <div id="btn-furniture" class="button with-sub" data-button="mebel">
                <div class="icon"><svg>
                        <use href="/tmp/sprite.svg#ui-sofa"></use>
                    </svg></div>
                <div class="label">Мебель</div>
            </div>
            <div id="undo" class="button inactive" data-button="undo">
                <div class="icon"><svg>
                        <use href="/tmp/sprite.svg#ui-undo"></use>
                    </svg></div>
                <div class="label">Отменить</div>
            </div>
            <div id="btn-trash" class="button inactive" data-button="trash">
                <div class="icon"><svg>
                        <use href="/tmp/sprite.svg#ui-trash"></use>
                    </svg></div>
                <div class="label">Удалить</div>
            </div>
        </div>
    </div>

    <div class="app-ui app-ui-right">
        <div class="main">
            <div id="zoom-in" class="button" data-button="zoom-in">
                <div class="icon"><svg>
                        <use href="/tmp/sprite.svg#ui-zoom-in"></use>
                    </svg></div>
            </div>
            <div id="zoom-reset" class="button" data-button="zoom-centred">
                <div class="icon"><svg>
                        <use href="/tmp/sprite.svg#ui-zoom-centred"></use>
                    </svg></div>
            </div>
            <div id="zoom-out" class="button" data-button="zoom-out">
                <div class="icon"><svg>
                        <use href="/tmp/sprite.svg#ui-zoom-out"></use>
                    </svg></div>
            </div>
        </div>
    </div>

    <div class="sub-menu" data-parent-button="build">
        <div class="main">
            <div id="btn-wall" class="button" data-button="add-wall">
                <div class="icon"><svg>
                        <use href="/tmp/sprite.svg#ui-wall"></use>
                    </svg></div>
                <div class="label">Стена</div>
            </div>
            <div id="btn-door" class="button" data-button="add-door">

                        <use href="/tmp/sprite.svg#ui-door"></use>
                    </svg></div>
                <div class="label">Дверь</div>
            </div>
        </div>

<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Planner</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body class="app">
  <div id="workspace" class="workspace"></div>

  <!-- LEFT PANEL -->
  <aside class="panel">
    <div class="panel__title">Planner</div>

    <button id="btn-wall" class="tool" type="button">
      <span class="tool__icon">🧱</span>
      <span class="tool__label">Добавить стену</span>
    </button>
    <button id="btn-door" class="tool" type="button">
      <span class="tool__icon">🚪</span>
      <span class="tool__label">Добавить дверь</span>
    </button>
    <button id="btn-furniture" class="btn tool">Мебель</button>
    <div id="furniture-menu" class="fmenu is-hidden"></div>


    <button id="btn-trash" type="button" class="tool">
      <span class="tool__icon">🗑</span>
      <span class="tool__label">Удалить элемент</span>
    </button>
    <button id="btn-metrics" class="tool" type="button">
      <span class="tool__icon">📏</span>
      <span class="tool__label">Размеры</span>
    </button>


    <div class="panel__divider"></div>

    <div class="panel__hint" id="hint">
      Select: просто смотри.
    </div>
  </aside>


  <div class="hud">
    <div class="zoom">
      <button class="zoom__btn" id="undo" type="button" title="Undo (Ctrl/⌘+Z)" aria-label="Undo">
        <img class="zoom__icon" src="./images/icons/undo.svg" alt="" aria-hidden="true">
      </button>

      <button class="zoom__btn" id="redo" type="button" title="Redo (Ctrl/⌘+Y or Ctrl/⌘+Shift+Z)" aria-label="Redo">
        <img class="zoom__icon" src="./images/icons/redo.svg" alt="" aria-hidden="true">
      </button>



      <button class="zoom__btn" id="zoom-in" type="button" title="Zoom in" aria-label="Zoom in">＋</button>
      <button class="zoom__btn" id="zoom-out" type="button" title="Zoom out" aria-label="Zoom out">−</button>
    </div>
    <!-- <div class="dpad" id="dpad">
      <button class="dpad__btn dpad__btn--up" data-pan="up" type="button" aria-label="Up">↑</button>
      <button class="dpad__btn dpad__btn--left" data-pan="left" type="button" aria-label="Left">←</button>
      <button class="dpad__btn dpad__btn--center" data-pan="center" type="button" aria-label="Center">⦿</button>
      <button class="dpad__btn dpad__btn--right" data-pan="right" type="button" aria-label="Right">→</button>
      <button class="dpad__btn dpad__btn--down" data-pan="down" type="button" aria-label="Down">↓</button>
    </div> -->
  </div>

  <div class="status" id="status">Готово</div>

  <script type="module" src="./planner/app.js"></script>
</body>

</html>
